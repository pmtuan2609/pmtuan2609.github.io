<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Ôn tập KHTN | Lê Thị Việt Hà</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap');
        body { font-family: 'Lexend', sans-serif; background: #0f172a; color: white; }
        .class-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }
        .class-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.05); border-color: #10b981; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div id="root" class="w-full max-w-6xl"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const Icon = ({ name, size = 18 }) => {
            const ref = React.useRef(null);
            useEffect(() => { if (window.lucide) window.lucide.createIcons({ root: ref.current }); }, [name]);
            return <span ref={ref}><i data-lucide={name} style={{width: size, height: size}}></i></span>;
        };

        const App = () => {
            const [exams] = useState(() => JSON.parse(localStorage.getItem('tMath_Exams') || '[]'));
            const [selectedClass, setSelectedClass] = useState(null);

            // Lấy danh sách lớp duy nhất
            const classes = useMemo(() => {
                const unique = [...new Set(exams.map(e => e.className))];
                return unique.sort();
            }, [exams]);

            const filteredExams = useMemo(() => {
                return exams.filter(e => e.className === selectedClass);
            }, [exams, selectedClass]);

            if (selectedClass) {
                return (
                    <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                        <button onClick={() => setSelectedClass(null)} className="mb-8 flex items-center gap-2 text-emerald-400 font-bold uppercase text-[10px] tracking-widest"><Icon name="arrow-left" size={14}/> Quay lại chọn lớp</button>
                        <h2 className="text-3xl font-bold mb-2 uppercase tracking-tighter">Bài ôn tập: Lớp {selectedClass}</h2>
                        <p className="text-slate-400 text-xs mb-10 uppercase tracking-widest">Giáo viên: Lê Thị Việt Hà</p>
                        <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {filteredExams.map(e => (
                                <div key={e.id} className="bg-white/5 border border-white/10 p-8 rounded-[2.5rem] flex flex-col h-full hover:border-emerald-500/50 transition-all">
                                    <div className="mb-6"><span className="px-3 py-1 bg-emerald-500/10 text-emerald-400 rounded-lg text-[10px] font-bold uppercase">{e.category === 'kiem_tra' ? 'Kiểm tra' : 'Luyện tập'}</span></div>
                                    <h3 className="text-xl font-bold mb-8 leading-snug line-clamp-2">{e.title}</h3>
                                    <div className="mt-auto flex justify-between items-center">
                                        <span className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">{e.duration} Phút</span>
                                        <button onClick={() => window.open('quiz.html?id='+e.id, '_blank')} className="bg-emerald-500 text-white px-8 py-3 rounded-2xl font-bold text-[10px] uppercase shadow-lg shadow-emerald-500/20">Vào làm</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div class="text-center animate-in fade-in duration-700">
                    <div class="w-20 h-20 bg-emerald-500 text-white rounded-[2rem] flex items-center justify-center mx-auto mb-8 shadow-2xl rotate-3"><Icon name="atom" size={44} /></div>
                    <h1 className="text-4xl font-bold mb-2 uppercase tracking-tighter">Hệ thống ôn tập KHTN</h1>
                    <p className="text-emerald-400 font-bold mb-16 text-[10px] tracking-[0.3em] uppercase">Giáo viên: Lê Thị Việt Hà</p>
                    
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                        {classes.length === 0 ? <p className="text-slate-500 col-span-full italic">Chưa có bài ôn tập nào được đăng.</p> : 
                        classes.map(c => (
                            <div key={c} onClick={() => setSelectedClass(c)} className="class-card bg-white/5 p-10 rounded-[3rem] flex flex-col items-center justify-center gap-4">
                                <div className="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center text-emerald-400"><Icon name="folder" /></div>
                                <span className="text-2xl font-bold uppercase tracking-tighter">Lớp {c}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
