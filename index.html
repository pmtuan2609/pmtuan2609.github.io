<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống học tập trực tuyến</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;700;900&display=swap');
        body { font-family: 'Lexend', sans-serif; background-color: #f8fafc; overflow: hidden; }
        .word-content img { max-width: 100%; border-radius: 12px; margin: 16px 0; }
        .mini-map-btn { transition: all 0.1s; cursor: pointer; }
        .mini-map-btn.done { background-color: #10b981 !important; color: white !important; border-color: #10b981 !important; }
        .column-scroll::-webkit-scrollbar { width: 4px; }
        .column-scroll::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 18, className = "" }) => {
            const ref = React.useRef(null);
            useEffect(() => { if (window.lucide) window.lucide.createIcons({ root: ref.current }); }, [name]);
            return <span ref={ref} className={className}><i data-lucide={name} style={{width: size, height: size}}></i></span>;
        };

        const App = () => {
            const [view, setView] = useState('quiz'); // Chế độ mặc định quiz để xem thiết kế
            const [ans, setAns] = useState({});

            return (
                <div className="h-screen flex flex-col overflow-hidden">
                    {/* TOP BAR */}
                    <header className="bg-white border-b px-8 py-4 flex justify-between items-center shadow-sm shrink-0 z-10">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-emerald-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-emerald-200">
                                <Icon name="atom" size={28}/>
                            </div>
                            <div className="text-left">
                                <h2 className="font-extrabold text-slate-800 text-lg uppercase tracking-tight leading-tight">Ôn tập Khoa học tự nhiên</h2>
                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-0.5">Giáo viên: Cô Lê Thị Việt Hà</p>
                            </div>
                        </div>

                        <div className="flex items-center gap-10">
                            <div className="flex items-center gap-3 bg-slate-50 px-6 py-2.5 rounded-2xl border border-slate-100">
                                <Icon name="clock" className="text-emerald-500" />
                                <span className="text-2xl font-black text-slate-700 tracking-tight">45:00</span>
                            </div>
                            <button className="bg-slate-900 text-white px-12 py-3.5 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-xl hover:bg-emerald-600 transition-all">
                                Nộp bài ngay
                            </button>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden">
                        {/* LEFT: CONTENT WORD */}
                        <main className="flex-1 overflow-y-auto p-12 bg-slate-200/50 column-scroll">
                            <div className="max-w-3xl mx-auto bg-white p-16 rounded-[4rem] shadow-xl min-h-full word-content text-left">
                                <div className="space-y-8">
                                    <div className="border-b-4 border-emerald-50 pb-6 mb-10 flex justify-between items-end">
                                        <h3 className="text-2xl font-black text-slate-800 uppercase tracking-tighter">Nội dung đề bài</h3>
                                        <span className="text-xs font-bold text-slate-400 bg-slate-50 px-4 py-1 rounded-full border">DOCX FILE</span>
                                    </div>
                                    <div className="text-slate-600 text-lg leading-relaxed">
                                        {/* Demo nội dung */}
                                        <p className="font-bold text-slate-800 mb-4">Câu 1. Nguyên tử được cấu tạo bởi các loại hạt nào?</p>
                                        <div className="space-y-2 mb-8">
                                            <p>A. Proton và electron</p>
                                            <p>B. Proton và neutron</p>
                                            <p>C. Proton, neutron và electron</p>
                                            <p>D. Electron và neutron</p>
                                        </div>
                                        <hr className="opacity-50" />
                                        {/* Ảnh bóc tách từ Word sẽ render ở đây */}
                                    </div>
                                </div>
                            </div>
                        </main>

                        {/* RIGHT: MINI-MAP & ANSWER BOX */}
                        <aside className="w-80 bg-white border-l p-8 flex flex-col shadow-2xl z-10 shrink-0">
                            <div className="text-center mb-8">
                                <h3 className="text-[11px] font-black uppercase text-slate-400 tracking-[0.3em] mb-2">Tiến độ làm bài</h3>
                                <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                    <div className="bg-emerald-500 h-full w-1/4 transition-all"></div>
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto pr-2 column-scroll">
                                <div className="grid grid-cols-4 gap-3">
                                    {Array.from({length: 40}).map((_, i) => (
                                        <button key={i} className={`h-12 rounded-2xl mini-map-btn font-black text-sm bg-slate-50 border-2 border-slate-100 text-slate-400 hover:border-emerald-500`}>
                                            {i+1}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="mt-8 pt-6 border-t border-slate-100 space-y-4">
                                <div className="flex justify-between items-center text-[10px] font-black text-slate-500 uppercase">
                                    <span>Học sinh:</span>
                                    <span className="text-slate-800">Phạm Minh Tuấn</span>
                                </div>
                                <div className="flex justify-between items-center text-[10px] font-black text-slate-500 uppercase">
                                    <span>Đã hoàn thành:</span>
                                    <span className="text-emerald-600">10/40 Câu</span>
                                </div>
                            </div>
                        </aside>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
