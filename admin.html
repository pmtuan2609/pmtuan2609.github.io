<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị KHTN | Lê Thị Việt Hà</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #334155; }
        .custom-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; border: 2px solid transparent; background-clip: padding-box; }
        
        .active-tab { background-color: #4f46e5 !important; color: white !important; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25); }
        .icon-btn { display: flex; align-items: center; justify-content: center; padding: 6px; border-radius: 6px; transition: all 0.2s; cursor: pointer; }
        
        /* Tùy chỉnh thanh công cụ Quill (Word thu nhỏ) */
        .ql-toolbar.ql-snow { border-top-left-radius: 0.5rem; border-top-right-radius: 0.5rem; background-color: #f8fafc; border-color: #cbd5e1; }
        .ql-container.ql-snow { border-bottom-left-radius: 0.5rem; border-bottom-right-radius: 0.5rem; border-color: #cbd5e1; font-family: 'Inter', sans-serif; font-size: 14px; background: white;}
        .ql-editor { min-height: 250px; max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const CATEGORIES = { luyen_tap: 'Luyện tập', bai_tap: 'Bài tập', kiem_tra: 'Kiểm tra' };

        const Icon = ({ name, size = 16, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => { if (window.lucide) window.lucide.createIcons({ root: ref.current }); }, [name]);
            return <span ref={ref} className={className}><i data-lucide={name} style={{width: size, height: size}}></i></span>;
        };

        const getExamStatus = (openTime, closeTime) => {
            if (!openTime && !closeTime) return { label: 'Chưa cài đặt', class: 'bg-slate-100 text-slate-500 border-slate-200' };
            const now = new Date().getTime();
            const start = openTime ? new Date(openTime).getTime() : 0;
            const end = closeTime ? new Date(closeTime).getTime() : Infinity;

            if (now < start) return { label: 'Chờ mở', class: 'bg-yellow-50 text-yellow-600 border-yellow-200' };
            if (now >= start && now <= end) return { label: 'Đang mở', class: 'bg-emerald-50 text-emerald-600 border-emerald-200' };
            if (now > end) return { label: 'Đã đóng', class: 'bg-rose-50 text-rose-600 border-rose-200' };
            return { label: 'Không xác định', class: 'bg-slate-100 text-slate-500 border-slate-200' };
        };

        // --- QUẢN LÝ HỌC SINH ---
        const StudentModal = ({ onClose }) => {
            const [students, setStudents] = useState(() => JSON.parse(localStorage.getItem('tMath_Students') || '[]'));
            const [input, setInput] = useState({ firstName: '', lastName: '', className: '' });
            const [expandedClass, setExpandedClass] = useState(null);

            const saveSt = (data) => { 
                setStudents(data); 
                localStorage.setItem('tMath_Students', JSON.stringify(data)); 
            };

            const handleManual = () => {
                if(!input.firstName || !input.lastName || !input.className) return alert("Vui lòng điền đủ Lớp, Họ và Tên!");
                const newSt = { id: Date.now(), name: `${input.lastName} ${input.firstName}`.trim(), className: input.className.trim() };
                saveSt([...students, newSt]);
                setInput({ ...input, firstName: '', lastName: '' });
                setExpandedClass(newSt.className);
            };

            const handleExcel = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const wb = XLSX.read(evt.target.result, { type: 'binary' });
                    const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
                    const imported = data.slice(1).filter(r => r[0] && r[1] && r[2]).map(r => ({
                        id: Math.random(), className: r[0].toString().trim(), name: `${r[1]} ${r[2]}`.trim()
                    }));
                    saveSt([...students, ...imported]);
                    alert(`Đã thêm thành công ${imported.length} học sinh!`);
                };
                reader.readAsBinaryString(file);
            };

            const groupedStudents = useMemo(() => {
                return students.reduce((acc, s) => {
                    if (!acc[s.className]) acc[s.className] = [];
                    acc[s.className].push(s);
                    return acc;
                }, {});
            }, [students]);

            return (
                <div className="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                    <div className="bg-white w-full max-w-4xl h-[85vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden animate-in zoom-in duration-200">
                        <div className="p-5 bg-indigo-600 text-white flex justify-between items-center">
                            <h2 className="font-semibold text-lg flex items-center gap-2"><Icon name="users" size={20}/> Quản Lý Học Sinh</h2>
                            <button onClick={onClose} className="p-1.5 hover:bg-white/20 rounded-lg transition-colors"><Icon name="x" size={24}/></button>
                        </div>
                        <div className="flex-1 flex flex-col md:flex-row bg-slate-50 overflow-hidden text-left">
                            <div className="w-full md:w-[320px] p-6 border-r bg-white space-y-6 overflow-y-auto custom-scroll">
                                <div className="space-y-3">
                                    <h3 className="text-sm font-bold text-slate-800 flex items-center gap-2 mb-4"><Icon name="user-plus" size={16} className="text-indigo-600"/> Thêm Thủ Công</h3>
                                    <div>
                                        <label className="text-xs font-semibold text-slate-500 mb-1 block">Lớp muốn tạo (VD: 6A1, Lớp 7...)</label>
                                        <input type="text" placeholder="Nhập tên lớp..." value={input.className} onChange={e=>setInput({...input, className: e.target.value})} className="w-full p-2.5 rounded-lg border border-slate-300 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-semibold text-slate-500 mb-1 block">Họ lót</label>
                                        <input type="text" placeholder="Nguyễn Văn..." value={input.lastName} onChange={e=>setInput({...input, lastName: e.target.value})} className="w-full p-2.5 rounded-lg border border-slate-300 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-semibold text-slate-500 mb-1 block">Tên</label>
                                        <input type="text" placeholder="A" value={input.firstName} onChange={e=>setInput({...input, firstName: e.target.value})} className="w-full p-2.5 rounded-lg border border-slate-300 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" />
                                    </div>
                                    <button onClick={handleManual} className="w-full py-2.5 mt-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-semibold text-sm transition-colors">Thêm vào danh sách</button>
                                </div>
                                <div className="pt-6 border-t border-slate-200">
                                    <h3 className="text-sm font-bold text-slate-800 flex items-center gap-2 mb-4"><Icon name="file-spreadsheet" size={16} className="text-emerald-600"/> Nhập Từ Excel</h3>
                                    <label className="block w-full py-6 px-4 bg-emerald-50 text-emerald-700 border border-dashed border-emerald-300 hover:border-emerald-500 rounded-xl font-semibold text-sm text-center cursor-pointer hover:bg-emerald-100 transition-all">
                                        <Icon name="upload-cloud" size={24} className="block mx-auto mb-2" /> TẢI FILE EXCEL LÊN
                                        <input type="file" accept=".xlsx, .xls" className="hidden" onChange={handleExcel} />
                                    </label>
                                </div>
                            </div>
                            <div className="flex-1 p-6 overflow-y-auto custom-scroll bg-slate-50">
                                <div className="flex justify-between items-center mb-4 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                    <h4 className="font-bold text-slate-700">Tổng số: <span className="text-indigo-600">{students.length}</span> HS</h4>
                                    <button onClick={()=>{if(confirm('Xóa toàn bộ danh sách?')) saveSt([]);}} className="text-xs font-bold text-rose-600 bg-rose-50 hover:bg-rose-100 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1">
                                        <Icon name="trash-2" size={14}/> XÓA TẤT CẢ
                                    </button>
                                </div>
                                <div className="space-y-3">
                                    {Object.keys(groupedStudents).sort().map(className => (
                                        <div key={className} className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden transition-all">
                                            <div className="flex items-center justify-between p-4 cursor-pointer hover:bg-slate-50" onClick={() => setExpandedClass(expandedClass === className ? null : className)}>
                                                <div className="flex items-center gap-3">
                                                    <Icon name={expandedClass === className ? "folder-open" : "folder"} className="text-indigo-500" size={20}/>
                                                    <span className="font-bold text-slate-800">{className}</span>
                                                    <span className="text-xs font-semibold bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">{groupedStudents[className].length} HS</span>
                                                </div>
                                                <Icon name={expandedClass === className ? "chevron-up" : "chevron-down"} className="text-slate-400" size={18}/>
                                            </div>
                                            {expandedClass === className && (
                                                <div className="border-t border-slate-100 bg-slate-50/50 p-2 space-y-1">
                                                    {groupedStudents[className].sort((a,b)=>a.name.localeCompare(b.name)).map(s => (
                                                        <div key={s.id} className="flex items-center justify-between p-2.5 bg-white border border-slate-100 rounded-lg hover:border-indigo-200 transition-all ml-4">
                                                            <span className="font-medium text-sm text-slate-700">{s.name}</span>
                                                            <button onClick={(e)=>{e.stopPropagation(); saveSt(students.filter(i=>i.id!==s.id))}} className="p-1 text-slate-300 hover:bg-rose-50 hover:text-rose-600 rounded transition-colors"><Icon name="x" size={16}/></button>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                    {Object.keys(groupedStudents).length === 0 && <div className="text-center text-slate-400 py-10 text-sm">Chưa có lớp nào được tạo.</div>}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- CÀI ĐẶT THỜI GIAN ---
        const TimeModal = ({ exam, onClose, onSave }) => {
            const [openTime, setOpenTime] = useState(exam.openTime || '');
            const [closeTime, setCloseTime] = useState(exam.closeTime || '');
            return (
                <div className="fixed inset-0 z-[110] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                    <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-bold text-slate-800 flex items-center gap-2"><Icon name="clock" className="text-indigo-600"/> Cài đặt thời gian</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><Icon name="x"/></button>
                        </div>
                        <p className="text-sm text-slate-500 mb-4 line-clamp-2">{exam.title}</p>
                        <div className="space-y-4 mb-6">
                            <div><label className="block text-xs font-semibold text-slate-500 mb-1">Giờ mở đề tự động</label><input type="datetime-local" value={openTime} onChange={(e) => setOpenTime(e.target.value)} className="w-full p-2.5 border border-slate-300 rounded-lg text-sm outline-none" /></div>
                            <div><label className="block text-xs font-semibold text-slate-500 mb-1">Giờ đóng đề tự động</label><input type="datetime-local" value={closeTime} onChange={(e) => setCloseTime(e.target.value)} className="w-full p-2.5 border border-slate-300 rounded-lg text-sm outline-none" /></div>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={onClose} className="flex-1 py-2.5 bg-slate-100 text-slate-600 font-semibold rounded-lg text-sm hover:bg-slate-200">Hủy</button>
                            <button onClick={() => onSave(exam.id, openTime, closeTime)} className="flex-1 py-2.5 bg-indigo-600 text-white font-semibold rounded-lg text-sm shadow-md hover:bg-indigo-700">Lưu cài đặt</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- CỬA SỔ CHỈNH SỬA VĂN BẢN (MINI WORD DÙNG QUILL) ---
        const EditFileModal = ({ exam, onClose, onSave }) => {
            const editorRef = useRef(null);
            const quillInstance = useRef(null);

            useEffect(() => {
                if (editorRef.current && !quillInstance.current) {
                    quillInstance.current = new Quill(editorRef.current, {
                        theme: 'snow',
                        placeholder: 'Nhập nội dung câu hỏi, đáp án hoặc dán từ Word vào đây...',
                        modules: {
                            toolbar: [
                                [{ 'header': [1, 2, 3, false] }],
                                ['bold', 'italic', 'underline', 'strike'],
                                [{ 'color': [] }, { 'background': [] }],
                                [{ 'script': 'sub'}, { 'script': 'super' }],
                                [{ 'list': 'ordered'}, { 'list': 'bullet' }, { 'align': [] }],
                                ['link', 'image', 'formula'],
                                ['clean']
                            ]
                        }
                    });
                    
                    // Nạp dữ liệu cũ vào Quill nếu có
                    if (exam.answerNote) {
                        quillInstance.current.clipboard.dangerouslyPasteHTML(exam.answerNote);
                    }
                }
            }, [exam.answerNote]);

            const handleSave = () => {
                const htmlContent = quillInstance.current.root.innerHTML;
                onSave(exam.id, htmlContent);
            };

            return (
                <div className="fixed inset-0 z-[110] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                    <div className="bg-white w-full max-w-4xl h-[85vh] rounded-2xl shadow-2xl flex flex-col">
                        <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-indigo-50/50 rounded-t-2xl">
                            <div>
                                <h3 className="font-bold text-slate-800 flex items-center gap-2"><Icon name="edit-3" className="text-indigo-600"/> Soạn thảo / Cập nhật nội dung</h3>
                                <p className="text-sm font-semibold text-indigo-700 mt-1">{exam.title}</p>
                            </div>
                            <button onClick={onClose} className="p-2 bg-white rounded-lg shadow-sm text-slate-400 hover:text-slate-600 transition-colors"><Icon name="x"/></button>
                        </div>
                        
                        <div className="flex-1 p-6 overflow-hidden flex flex-col bg-slate-50">
                            <div className="flex-1 bg-white rounded-lg flex flex-col shadow-sm border border-slate-200">
                                <div ref={editorRef} className="flex-1"></div>
                            </div>
                            <p className="text-xs text-slate-400 mt-3 italic">* Hệ thống sẽ lưu giữ nguyên định dạng (in đậm, in nghiêng, màu sắc...) giống như MS Word.</p>
                        </div>

                        <div className="p-5 border-t border-slate-100 bg-white rounded-b-2xl flex justify-end gap-3">
                            <button onClick={onClose} className="px-6 py-2.5 bg-slate-100 text-slate-600 font-semibold rounded-lg text-sm hover:bg-slate-200">Hủy</button>
                            <button onClick={handleSave} className="px-6 py-2.5 bg-indigo-600 text-white font-semibold rounded-lg text-sm shadow-md hover:bg-indigo-700 flex justify-center items-center gap-2">
                                <Icon name="save" size={16}/> Lưu thay đổi
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- GIAO BÀI (CHỌN THEO LỚP) ---
        const AssignModal = ({ exam, onClose, onSave }) => {
            const allStudents = useMemo(() => JSON.parse(localStorage.getItem('tMath_Students') || '[]'), []);
            // Lấy danh sách các lớp hiện có từ bảng học sinh
            const availableClasses = useMemo(() => [...new Set(allStudents.map(s => s.className))].sort(), [allStudents]);
            
            // Đã đổi allowedStudents thành allowedClasses
            const [selectedClasses, setSelectedClasses] = useState(exam.allowedClasses || []);

            const toggleClass = (cls) => setSelectedClasses(prev => prev.includes(cls) ? prev.filter(c => c !== cls) : [...prev, cls]);
            const selectAll = () => setSelectedClasses(selectedClasses.length === availableClasses.length ? [] : [...availableClasses]);

            return (
                <div className="fixed inset-0 z-[110] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                    <div className="bg-white w-full max-w-md h-[60vh] rounded-2xl shadow-2xl flex flex-col">
                        <div className="p-5 border-b border-slate-100 flex justify-between items-center">
                            <div>
                                <h3 className="font-bold text-slate-800 flex items-center gap-2"><Icon name="users" className="text-indigo-600"/> Cấp quyền truy cập đề</h3>
                                <p className="text-xs text-slate-500 mt-1 truncate max-w-[250px]">{exam.title}</p>
                            </div>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600"><Icon name="x"/></button>
                        </div>
                        <div className="p-4 border-b border-slate-100 bg-slate-50 flex justify-between items-center">
                            <span className="text-sm font-semibold text-slate-600">Đã chọn: {selectedClasses.length} lớp</span>
                            <button onClick={selectAll} className="text-xs font-bold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-lg">Chọn tất cả</button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-2 custom-scroll text-left">
                            {availableClasses.length === 0 ? (
                                <div className="text-center text-slate-400 text-sm mt-10">Chưa có lớp nào được tạo trong mục Học Sinh.</div>
                            ) : (
                                availableClasses.map(cls => (
                                    <label key={cls} className="flex items-center gap-3 p-4 hover:bg-slate-50 rounded-xl cursor-pointer transition-colors border-b border-slate-50">
                                        <input type="checkbox" checked={selectedClasses.includes(cls)} onChange={() => toggleClass(cls)} className="w-5 h-5 text-indigo-600 rounded border-slate-300 focus:ring-indigo-500" />
                                        <span className="text-sm font-bold text-slate-700 flex items-center gap-2"><Icon name="folder" size={16} className="text-indigo-400"/> {cls}</span>
                                    </label>
                                ))
                            )}
                        </div>
                        <div className="p-4 border-t border-slate-100">
                            <button onClick={() => onSave(exam.id, selectedClasses)} className="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl text-sm shadow-md hover:bg-indigo-700 transition-colors">Lưu danh sách lớp</button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- KẾT QUẢ LÀM BÀI ---
        const ResultsModal = ({ exam, onClose }) => {
            const allStudents = useMemo(() => JSON.parse(localStorage.getItem('tMath_Students') || '[]'), []);
            // Dựa vào allowedClasses để lọc ra học sinh
            const assignedStudents = allStudents.filter(s => exam.allowedClasses?.includes(s.className));
            const mockResults = exam.results || {}; 

            return (
                <div className="fixed inset-0 z-[110] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                    <div className="bg-white w-full max-w-4xl h-[80vh] rounded-2xl shadow-2xl flex flex-col">
                        <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-emerald-50/50 rounded-t-2xl">
                            <div>
                                <h3 className="font-bold text-slate-800 flex items-center gap-2"><Icon name="bar-chart-2" className="text-emerald-600"/> Kết quả làm bài</h3>
                                <p className="text-sm font-semibold text-emerald-700 mt-1">{exam.title} (Đã giao: {exam.allowedClasses?.join(', ') || 'Chưa giao'})</p>
                            </div>
                            <button onClick={onClose} className="p-2 bg-white rounded-lg shadow-sm text-slate-400 hover:text-slate-600 transition-colors"><Icon name="x"/></button>
                        </div>
                        
                        <div className="flex-1 overflow-auto bg-slate-50 p-6 custom-scroll text-left">
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                <table className="w-full text-sm text-left">
                                    <thead className="text-xs text-slate-500 bg-slate-100 uppercase border-b border-slate-200">
                                        <tr>
                                            <th className="px-6 py-4 font-bold">Họ và Tên</th>
                                            <th className="px-4 py-4 font-bold text-center">Lớp</th>
                                            <th className="px-4 py-4 font-bold text-center">Trạng thái</th>
                                            <th className="px-4 py-4 font-bold text-center">Điểm số</th>
                                            <th className="px-4 py-4 font-bold text-center">Thời gian làm</th>
                                            <th className="px-4 py-4 font-bold text-center">Ngày Nộp</th>
                                            <th className="px-4 py-4 font-bold text-center">Vi phạm</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {assignedStudents.length === 0 ? (
                                            <tr><td colSpan="7" className="px-6 py-8 text-center text-slate-400">Bạn chưa giao đề này cho lớp nào, hoặc lớp chưa có học sinh.</td></tr>
                                        ) : (
                                            assignedStudents.sort((a,b)=>a.className.localeCompare(b.className) || a.name.localeCompare(b.name)).map(s => {
                                                const res = mockResults[s.id]; 
                                                return (
                                                    <tr key={s.id} className="border-b border-slate-50 hover:bg-slate-50/80 transition-colors">
                                                        <td className="px-6 py-4 font-medium text-slate-800">{s.name}</td>
                                                        <td className="px-4 py-4 text-center font-bold text-slate-500 text-xs">{s.className}</td>
                                                        <td className="px-4 py-4 text-center">
                                                            {res ? <span className="bg-emerald-100 text-emerald-700 px-2 py-1 rounded text-xs font-bold">Đã nộp</span> 
                                                                 : <span className="bg-slate-100 text-slate-400 px-2 py-1 rounded text-xs font-bold">Chưa làm</span>}
                                                        </td>
                                                        <td className="px-4 py-4 text-center font-bold text-indigo-600">{res ? res.score : '-'}</td>
                                                        <td className="px-4 py-4 text-center text-slate-500">{res ? res.timeSpent : '-'}</td>
                                                        <td className="px-4 py-4 text-center text-slate-500">{res ? res.submitDate : '-'}</td>
                                                        <td className="px-4 py-4 text-center">
                                                            {res ? (res.violations > 0 ? <span className="text-rose-500 font-bold">{res.violations} lỗi</span> : <span className="text-emerald-500">0</span>) : '-'}
                                                        </td>
                                                    </tr>
                                                );
                                            })
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- KHO LƯU TRỮ (CHIA THEO LỚP) ---
        const ArchiveModal = ({ exams, onClose, onRestore, onHardDelete }) => {
            const archivedExams = exams.filter(e => e.isArchived);
            const archivedClasses = [...new Set(archivedExams.map(e => e.className))].sort();
            const [activeArchiveClass, setActiveArchiveClass] = useState(archivedClasses[0] || "");

            // Cập nhật lại tab nếu list thay đổi
            useEffect(() => {
                if (archivedClasses.length > 0 && !archivedClasses.includes(activeArchiveClass)) setActiveArchiveClass(archivedClasses[0]);
            }, [archivedExams]);

            const displayExams = archivedExams.filter(e => e.className === activeArchiveClass);

            return (
                <div className="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                    <div className="bg-white w-full max-w-4xl h-[80vh] rounded-2xl shadow-2xl flex flex-col animate-in zoom-in duration-200">
                        <div className="p-5 bg-slate-800 text-white flex justify-between items-center rounded-t-2xl">
                            <h2 className="font-semibold text-lg flex items-center gap-2"><Icon name="archive" size={20}/> Kho Lưu Trữ Đề</h2>
                            <button onClick={onClose} className="p-1.5 hover:bg-white/20 rounded-lg transition-colors"><Icon name="x" size={24}/></button>
                        </div>
                        
                        {archivedClasses.length > 0 && (
                            <div className="bg-slate-50 border-b border-slate-200 px-6 py-3 flex gap-2 overflow-x-auto custom-scroll">
                                {archivedClasses.map(cls => (
                                    <button 
                                        key={cls} onClick={() => setActiveArchiveClass(cls)}
                                        className={`px-4 py-2 rounded-lg font-bold text-sm transition-all flex items-center gap-2 whitespace-nowrap ${activeArchiveClass === cls ? 'bg-slate-800 text-white shadow-md' : 'bg-white text-slate-500 border border-slate-200 hover:bg-slate-100'}`}
                                    >
                                        <Icon name="folder-kanban" size={14}/> {cls}
                                    </button>
                                ))}
                            </div>
                        )}

                        <div className="flex-1 overflow-y-auto p-6 bg-slate-50 custom-scroll space-y-3">
                            {archivedExams.length === 0 ? (
                                <div className="flex flex-col items-center justify-center h-full text-slate-400">
                                    <Icon name="inbox" size={48} className="mb-4 opacity-50"/>
                                    <p className="text-sm font-medium">Kho lưu trữ trống</p>
                                </div>
                            ) : (
                                displayExams.map(e => (
                                    <div key={e.id} className="flex justify-between items-center bg-white p-4 rounded-xl border border-slate-200 shadow-sm text-left">
                                        <div>
                                            <div className="flex items-center gap-2 mb-1">
                                                <span className="px-2 py-0.5 bg-slate-100 text-slate-600 rounded text-[10px] font-bold">{e.className}</span>
                                                <span className="text-xs text-slate-400 font-medium">{CATEGORIES[e.category]}</span>
                                            </div>
                                            <h4 className="font-semibold text-slate-700 text-sm">{e.title}</h4>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => onRestore(e.id)} className="px-3 py-1.5 bg-emerald-50 text-emerald-600 hover:bg-emerald-600 hover:text-white text-xs font-bold rounded-lg transition-colors flex items-center gap-1">
                                                <Icon name="rotate-ccw" size={14}/> Khôi phục
                                            </button>
                                            <button onClick={() => onHardDelete(e.id)} className="px-3 py-1.5 bg-rose-50 text-rose-600 hover:bg-rose-600 hover:text-white text-xs font-bold rounded-lg transition-colors flex items-center gap-1">
                                                <Icon name="trash-2" size={14}/> Xóa hẳn
                                            </button>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- GIAO DIỆN CHÍNH ---
        const App = () => {
            const [exams, setExams] = useState(() => JSON.parse(localStorage.getItem('tMath_Exams') || '[]'));
            const [showStudent, setShowStudent] = useState(false);
            const [showArchive, setShowArchive] = useState(false);
            const [activeModal, setActiveModal] = useState({ type: null, examId: null });
            const [activeClass, setActiveClass] = useState("");
            
            // Biến mặc định form
            const [form, setForm] = useState({ 
                title: '', grade: '', category: 'luyen_tap', duration: 45, attempts: 1, violations: 3 
            });

            // Tự động load danh sách lớp gợi ý vào dropdown "Lớp" khi tạo đề
            const availableClasses = useMemo(() => {
                const stds = JSON.parse(localStorage.getItem('tMath_Students') || '[]');
                const clsList = [...new Set(stds.map(s => s.className))].sort();
                if(!form.grade && clsList.length > 0) setForm(prev => ({...prev, grade: clsList[0]}));
                return clsList;
            }, [showStudent]);

            const [currentTime, setCurrentTime] = useState(Date.now());
            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(Date.now()), 60000);
                return () => clearInterval(timer);
            }, []);

            const activeExams = useMemo(() => exams.filter(e => !e.isArchived), [exams]);

            const uniqueClasses = useMemo(() => {
                const classes = [...new Set(activeExams.map(e => e.className))].sort();
                if (classes.length > 0 && !activeClass && classes.includes(activeClass) === false) setActiveClass(classes[0]);
                return classes;
            }, [activeExams, activeClass]);

            const updateExams = (newExams) => {
                setExams(newExams);
                localStorage.setItem('tMath_Exams', JSON.stringify(newExams));
            };

            const saveExam = () => {
                const targetGrade = form.grade || form.customGrade;
                if(!form.title.trim() || !targetGrade) return alert("Vui lòng nhập Tên đề thi và Lớp!");
                const newExam = { 
                    ...form, id: Date.now(), className: targetGrade.trim(), 
                    createdAt: new Date().toLocaleDateString('vi-VN'),
                    isArchived: false, allowedClasses: [], wordFile: null, 
                    openTime: '', closeTime: '', answerNote: '', results: {} 
                };
                updateExams([...exams, newExam]);
                setForm({...form, title: '', customGrade: ''}); 
                setActiveClass(targetGrade.trim());
            };

            const archiveExam = (id) => updateExams(exams.map(e => e.id === id ? { ...e, isArchived: true } : e));
            const restoreExam = (id) => updateExams(exams.map(e => e.id === id ? { ...e, isArchived: false } : e));
            const hardDeleteExam = (id) => {
                if(confirm('Bạn có chắc chắn muốn xóa vĩnh viễn đề này?')) updateExams(exams.filter(e => e.id !== id));
            };

            const handleWordUpload = (id, e) => {
                const file = e.target.files[0];
                if(file) updateExams(exams.map(ex => ex.id === id ? { ...ex, wordFile: file.name } : ex));
            };

            const saveTime = (id, openTime, closeTime) => {
                updateExams(exams.map(e => e.id === id ? { ...e, openTime, closeTime } : e));
                setActiveModal({ type: null, examId: null });
            };

            // Bây giờ data lưu là mảng danh sách các "Lớp" (allowedClasses)
            const saveStudents = (id, classes) => {
                updateExams(exams.map(e => e.id === id ? { ...e, allowedClasses: classes } : e));
                setActiveModal({ type: null, examId: null });
            };

            const saveAnswerNote = (id, note) => {
                updateExams(exams.map(e => e.id === id ? { ...e, answerNote: note } : e));
                setActiveModal({ type: null, examId: null });
            };

            const filteredColumns = useMemo(() => {
                const list = activeExams.filter(e => e.className === activeClass);
                return {
                    luyen_tap: list.filter(e => e.category === 'luyen_tap'),
                    bai_tap: list.filter(e => e.category === 'bai_tap'),
                    kiem_tra: list.filter(e => e.category === 'kiem_tra')
                };
            }, [activeExams, activeClass]);

            return (
                <div className="flex h-screen overflow-hidden text-slate-800">
                    <aside className="w-[340px] bg-white border-r border-slate-200 z-20 flex flex-col p-5 shrink-0 shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
                        <div className="mb-6 flex items-center gap-3 border-b border-slate-100 pb-5">
                            <div className="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg shadow-indigo-200">
                                <Icon name="flask-conical" size={24}/>
                            </div>
                            <div>
                                <h1 className="text-base font-bold text-slate-800 leading-tight">Quản trị KHTN</h1>
                                <p className="text-xs font-medium text-slate-500 mt-0.5">Cô Lê Thị Việt Hà</p>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-3 mb-6">
                            <button onClick={() => setShowStudent(true)} className="flex flex-col items-center justify-center p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-semibold text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-200 transition-all">
                                <Icon name="users" size={20} className="mb-1.5"/> Học sinh
                            </button>
                            <button onClick={() => setShowArchive(true)} className="flex flex-col items-center justify-center p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-semibold text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 hover:border-indigo-200 transition-all relative">
                                <Icon name="archive" size={20} className="mb-1.5"/> Lưu trữ
                                {exams.filter(e=>e.isArchived).length > 0 && <span className="absolute top-2 right-2 w-2 h-2 bg-rose-500 rounded-full"></span>}
                            </button>
                        </div>

                        <div className="flex-1 bg-white border border-slate-200 p-4 rounded-xl overflow-y-auto custom-scroll shadow-sm text-left">
                            <h3 className="text-sm font-bold text-slate-800 flex items-center gap-2 mb-4 pb-2 border-b border-slate-100">
                                <Icon name="file-plus-2" size={18} className="text-indigo-600"/> TẠO ĐỀ
                            </h3>
                            
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-xs font-semibold text-slate-500 mb-1">Tên đề thi</label>
                                    <input type="text" placeholder="Nhập tên đề..." value={form.title} onChange={e=>setForm({...form, title:e.target.value})} className="w-full p-2.5 rounded-lg border border-slate-300 text-sm focus:ring-2 focus:border-indigo-500 focus:ring-indigo-100 outline-none transition-all" />
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <div>
                                        <label className="block text-xs font-semibold text-slate-500 mb-1">Thư mục Lớp</label>
                                        {availableClasses.length > 0 ? (
                                            <select value={form.grade} onChange={e=>setForm({...form, grade:e.target.value})} className="w-full p-2.5 rounded-lg border border-slate-300 text-sm outline-none bg-white">
                                                {availableClasses.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        ) : (
                                            <input type="text" placeholder="VD: 6A1" value={form.customGrade || ''} onChange={e=>setForm({...form, customGrade:e.target.value})} className="w-full p-2.5 rounded-lg border border-slate-300 text-sm outline-none bg-white"/>
                                        )}
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-slate-500 mb-1">Loại bài</label>
                                        <select value={form.category} onChange={e=>setForm({...form, category:e.target.value})} className="w-full p-2.5 rounded-lg border border-slate-300 text-sm outline-none bg-white">
                                            {Object.entries(CATEGORIES).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
                                        </select>
                                    </div>
                                </div>
                                <div className="grid grid-cols-3 gap-2">
                                    <div>
                                        <label className="block text-[11px] font-semibold text-slate-500 mb-1 text-center">Thời gian (p)</label>
                                        <input type="number" min="1" value={form.duration} onChange={e=>setForm({...form, duration:e.target.value})} className="w-full p-2 rounded-lg border border-slate-300 text-sm font-medium text-center outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-[11px] font-semibold text-slate-500 mb-1 text-center">Lượt làm</label>
                                        <input type="number" min="1" value={form.attempts} onChange={e=>setForm({...form, attempts:e.target.value})} className="w-full p-2 rounded-lg border border-slate-300 text-sm font-medium text-center outline-none" />
                                    </div>
                                    <div>
                                        <label className="block text-[11px] font-semibold text-rose-500 mb-1 text-center">Lỗi vi phạm</label>
                                        <input type="number" min="0" value={form.violations} onChange={e=>setForm({...form, violations:e.target.value})} className="w-full p-2 rounded-lg border border-rose-300 text-rose-700 bg-rose-50 text-sm font-medium text-center outline-none" />
                                    </div>
                                </div>
                                <button onClick={saveExam} className="w-full py-3 mt-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-bold text-sm transition-all shadow-[0_4px_14px_0_rgba(79,70,229,0.39)] flex justify-center items-center gap-2">
                                    <Icon name="plus-circle" size={18}/> TẠO ĐỀ NGAY
                                </button>
                            </div>
                        </div>

                        <div className="mt-5 text-center pt-4 border-t border-slate-200">
                            <p className="text-xs font-semibold text-slate-400">&copy; Copyright Pham Minh Tuan</p>
                        </div>
                    </aside>

                    <main className="flex-1 flex flex-col overflow-hidden bg-slate-100/50">
                        <header className="bg-white px-6 py-4 border-b border-slate-200 flex items-center justify-between shadow-sm shrink-0">
                            <div className="flex gap-2 overflow-x-auto custom-scroll pb-1">
                                {uniqueClasses.length === 0 ? (
                                    <span className="text-sm font-medium text-slate-400 bg-slate-50 px-4 py-2 rounded-lg border border-dashed border-slate-300">Chưa có bài tập nào</span>
                                ) : (
                                    uniqueClasses.map(cls => (
                                        <button 
                                            key={cls} onClick={() => setActiveClass(cls)}
                                            className={`px-5 py-2 rounded-lg font-bold text-sm transition-all flex items-center gap-2 ${activeClass === cls ? 'active-tab' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}
                                        >
                                            <Icon name="folder-kanban" size={16}/> {cls}
                                        </button>
                                    ))
                                )}
                            </div>
                            <div className="px-4 border-l border-slate-200 ml-4 text-sm font-bold text-slate-500 whitespace-nowrap flex items-center gap-2">
                                <Icon name="layers" size={18} className="text-indigo-400"/> {activeExams.length} Bài
                            </div>
                        </header>

                        <div className="flex-1 flex p-6 gap-6 overflow-x-auto custom-scroll items-start">
                            {Object.entries(CATEGORIES).map(([key, label]) => (
                                <div key={key} className="flex-1 min-w-[340px] max-w-md flex flex-col bg-slate-200/50 rounded-2xl p-4 border border-slate-200 max-h-full">
                                    <div className="flex items-center justify-between mb-4 px-2">
                                        <h3 className="font-bold text-slate-700 uppercase text-sm flex items-center gap-2">
                                            <div className="w-2.5 h-2.5 rounded-full bg-indigo-500 shadow-sm"></div> {label}
                                        </h3>
                                        <span className="text-xs font-bold text-slate-500 bg-slate-300/50 px-2 py-0.5 rounded-md">{activeClass ? filteredColumns[key].length : 0}</span>
                                    </div>
                                    
                                    <div className="flex-1 overflow-y-auto space-y-3 custom-scroll pr-1 text-left">
                                        {activeClass && filteredColumns[key].map(e => {
                                            const status = getExamStatus(e.openTime, e.closeTime);
                                            return (
                                                <div key={e.id} className="bg-white p-4 rounded-xl border border-slate-200 hover:border-indigo-400 hover:shadow-md transition-all flex flex-col relative">
                                                    
                                                    <div className="flex justify-between items-start mb-2">
                                                        <span className={`px-2 py-1 rounded border text-[10px] font-bold ${status.class}`}>
                                                            {status.label}
                                                        </span>
                                                        <div className="flex gap-1">
                                                            {e.wordFile && <span className="text-[10px] text-blue-600 bg-blue-50 px-1.5 py-0.5 rounded flex items-center gap-0.5"><Icon name="file-text" size={10}/></span>}
                                                            {(e.openTime || e.closeTime) && <span className="text-[10px] text-orange-600 bg-orange-50 px-1.5 py-0.5 rounded flex items-center gap-0.5"><Icon name="clock" size={10}/></span>}
                                                        </div>
                                                    </div>
                                                    
                                                    <h4 className="font-semibold text-slate-800 text-sm leading-snug mb-3 pr-2">{e.title}</h4>
                                                    
                                                    <div className="grid grid-cols-3 gap-2 border-t border-slate-100 pt-3 mb-3">
                                                        <div className="flex flex-col items-center justify-center p-1.5 bg-slate-50 rounded-lg">
                                                            <span className="text-[10px] font-bold text-slate-600">{e.duration}p</span>
                                                        </div>
                                                        <div className="flex flex-col items-center justify-center p-1.5 bg-slate-50 rounded-lg">
                                                            <span className="text-[10px] font-bold text-slate-600">{e.attempts} Lần</span>
                                                        </div>
                                                        <div className="flex flex-col items-center justify-center p-1.5 bg-rose-50 rounded-lg">
                                                            <span className="text-[10px] font-bold text-rose-600">{e.violations} Lỗi</span>
                                                        </div>
                                                    </div>

                                                    {/* Toolbar chức năng */}
                                                    <div className="flex items-center justify-between border-t border-slate-100 pt-3 mt-auto">
                                                        <div className="flex gap-1.5">
                                                            <button onClick={() => setActiveModal({type: 'results', examId: e.id})} className="px-2.5 py-1 bg-emerald-50 text-emerald-600 hover:bg-emerald-600 hover:text-white rounded-md text-[10px] font-bold transition-colors flex items-center gap-1" title="Xem kết quả">
                                                                <Icon name="bar-chart-2" size={14}/> Kết quả
                                                            </button>
                                                            
                                                            <label className="icon-btn bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white" title="Tải lên file Word">
                                                                <Icon name="upload" size={14}/>
                                                                <input type="file" accept=".doc,.docx" hidden onChange={(evt) => handleWordUpload(e.id, evt)} />
                                                            </label>
                                                            
                                                            <button onClick={() => setActiveModal({type: 'editFile', examId: e.id})} className="icon-btn bg-slate-100 text-slate-600 hover:bg-slate-600 hover:text-white" title="Soạn thảo văn bản / Cập nhật đáp án">
                                                                <Icon name="edit-3" size={14}/>
                                                            </button>

                                                            <button onClick={() => setActiveModal({type: 'students', examId: e.id})} className="icon-btn bg-indigo-50 text-indigo-600 hover:bg-indigo-600 hover:text-white relative" title="Cấp quyền truy cập cho lớp">
                                                                <Icon name="users" size={14}/>
                                                                {e.allowedClasses?.length > 0 && <span className="absolute -top-1 -right-1 w-2 h-2 bg-emerald-500 rounded-full border border-white"></span>}
                                                            </button>
                                                            
                                                            <button onClick={() => setActiveModal({type: 'time', examId: e.id})} className="icon-btn bg-orange-50 text-orange-600 hover:bg-orange-500 hover:text-white" title="Cài đặt giờ mở/đóng">
                                                                <Icon name="calendar-clock" size={14}/>
                                                            </button>
                                                        </div>
                                                        <button onClick={() => archiveExam(e.id)} className="icon-btn bg-slate-50 text-slate-400 hover:bg-slate-700 hover:text-white" title="Lưu trữ đề">
                                                            <Icon name="archive-x" size={14}/>
                                                        </button>
                                                    </div>
                                                </div>
                                            )
                                        })}
                                        {(!activeClass || filteredColumns[key].length === 0) && (
                                            <div className="h-32 flex flex-col items-center justify-center text-slate-400 text-sm bg-white/50 rounded-xl border border-dashed border-slate-300">
                                                <Icon name="inbox" size={28} className="mb-2 text-slate-300" />
                                                Chưa có đề
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* RENDER MODALS */}
                    {showStudent && <StudentModal onClose={() => setShowStudent(false)} />}
                    {showArchive && <ArchiveModal exams={exams} onClose={() => setShowArchive(false)} onRestore={restoreExam} onHardDelete={hardDeleteExam} />}
                    {activeModal.type === 'time' && <TimeModal exam={exams.find(e => e.id === activeModal.examId)} onClose={() => setActiveModal({type:null, examId:null})} onSave={saveTime} />}
                    {activeModal.type === 'students' && <AssignModal exam={exams.find(e => e.id === activeModal.examId)} onClose={() => setActiveModal({type:null, examId:null})} onSave={saveStudents} />}
                    {activeModal.type === 'editFile' && <EditFileModal exam={exams.find(e => e.id === activeModal.examId)} onClose={() => setActiveModal({type:null, examId:null})} onSave={saveAnswerNote} />}
                    {activeModal.type === 'results' && <ResultsModal exam={exams.find(e => e.id === activeModal.examId)} onClose={() => setActiveModal({type:null, examId:null})} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
