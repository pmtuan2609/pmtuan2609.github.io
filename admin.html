<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản trị KHTN | Lê Thị Việt Hà</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap');
        body { font-family: 'Lexend', sans-serif; background-color: #f8fafc; }
        .column-scroll::-webkit-scrollbar { width: 4px; }
        .column-scroll::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        .sidebar-btn { transition: all 0.2s; border: 1px solid #e2e8f0; }
        .sidebar-btn:hover { background-color: #6366f1; color: white; border-color: #6366f1; transform: translateY(-1px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const CATEGORIES = { luyen_tap: 'Luyện tập', bai_tap: 'Bài tập', kiem_tra: 'Kiểm tra' };
        const GRADES = ['6', '7', '8', '9'];

        const Icon = ({ name, size = 16, className = "" }) => {
            const ref = React.useRef(null);
            useEffect(() => { if (window.lucide) window.lucide.createIcons({ root: ref.current }); }, [name]);
            return <span ref={ref} className={className}><i data-lucide={name} style={{width: size, height: size}}></i></span>;
        };

        const App = () => {
            const [activeGrade, setActiveGrade] = useState('6');
            const [exams, setExams] = useState([]);

            const columns = useMemo(() => {
                const gExams = exams.filter(e => e.grade === activeGrade);
                return {
                    luyen_tap: gExams.filter(e => e.category === 'luyen_tap'),
                    bai_tap: gExams.filter(e => e.category === 'bai_tap'),
                    kiem_tra: gExams.filter(e => e.category === 'kiem_tra')
                };
            }, [exams, activeGrade]);

            return (
                <div className="flex h-screen overflow-hidden text-slate-800">
                    {/* SIDEBAR QUẢN TRỊ */}
                    <aside className="w-80 bg-white border-r shadow-2xl z-20 flex flex-col p-6 shrink-0">
                        <div className="mb-8">
                            <h1 className="text-xl font-extrabold text-indigo-600 tracking-tight leading-tight uppercase">Hệ thống KHTN</h1>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1">Giáo viên: Lê Thị Việt Hà</p>
                        </div>

                        {/* NHÓM NÚT CHỨC NĂNG PHÍA TRÊN FORM */}
                        <div className="grid grid-cols-2 gap-2 mb-8">
                            <button onClick={() => window.open('students_manager.html', '_blank')} className="sidebar-btn flex flex-col items-center justify-center p-3 rounded-2xl text-slate-600 font-bold text-[11px] uppercase tracking-wider">
                                <Icon name="users" size={20} className="mb-1"/> Học sinh
                            </button>
                            <button onClick={() => window.open('archive.html', '_blank')} className="sidebar-btn flex flex-col items-center justify-center p-3 rounded-2xl text-slate-600 font-bold text-[11px] uppercase tracking-wider">
                                <Icon name="archive" size={20} className="mb-1"/> Lưu trữ
                            </button>
                        </div>

                        {/* FORM THÊM BÀI */}
                        <div className="flex-1 space-y-5 overflow-y-auto pr-2 custom-scrollbar">
                            <div className="bg-slate-50 p-5 rounded-3xl border border-slate-100 space-y-4">
                                <h3 className="text-[11px] font-black text-indigo-500 uppercase tracking-widest mb-2 flex items-center gap-2">
                                    <Icon name="plus-circle" size={14}/> Thêm bài mới
                                </h3>
                                
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Tiêu đề đề thi</label>
                                    <input type="text" placeholder="Nhập tên đề..." className="w-full p-3 bg-white border border-slate-200 rounded-xl font-bold text-sm outline-none focus:border-indigo-500 shadow-sm" />
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Thời gian (phút)</label>
                                        <div className="relative">
                                            <Icon name="clock" size={14} className="absolute left-3 top-3 text-slate-400" />
                                            <input type="number" defaultValue={45} className="w-full p-3 pl-9 bg-white border border-slate-200 rounded-xl font-bold text-sm outline-none focus:border-indigo-500" />
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Lượt làm bài</label>
                                        <div className="relative">
                                            <Icon name="refresh-cw" size={14} className="absolute left-3 top-3 text-slate-400" />
                                            <input type="number" defaultValue={1} className="w-full p-3 pl-9 bg-white border border-slate-200 rounded-xl font-bold text-sm outline-none focus:border-indigo-500" />
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Phân loại & Khối</label>
                                    <div className="grid grid-cols-2 gap-2">
                                        <select className="p-3 bg-white border border-slate-200 rounded-xl font-bold text-xs outline-none">
                                            {GRADES.map(g => <option key={g} value={g}>Lớp {g}</option>)}
                                        </select>
                                        <select className="p-3 bg-white border border-slate-200 rounded-xl font-bold text-xs outline-none">
                                            {Object.entries(CATEGORIES).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
                                        </select>
                                    </div>
                                </div>

                                <label className="flex flex-col items-center justify-center border-2 border-dashed border-indigo-100 rounded-2xl py-6 px-4 cursor-pointer hover:bg-white transition-all group">
                                    <Icon name="file-up" size={24} className="text-indigo-400 mb-2" />
                                    <span className="text-[10px] font-black text-indigo-400 uppercase">Chọn Word (.docx)</span>
                                    <input type="file" accept=".docx" className="hidden" />
                                </label>

                                <button className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all uppercase text-[11px] tracking-widest">
                                    Tải lên hệ thống
                                </button>
                            </div>
                        </div>

                        <div className="mt-auto pt-6 text-center border-t border-slate-100">
                            <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Bản quyền thuộc Lê Thị Việt Hà</p>
                        </div>
                    </aside>

                    {/* KHO ĐỀ CHIA 3 CỘT */}
                    <main className="flex-1 flex flex-col overflow-hidden bg-slate-50">
                        <header className="bg-white p-4 border-b flex items-center justify-between shadow-sm shrink-0">
                            <div className="flex bg-slate-100 p-1.5 rounded-2xl">
                                {GRADES.map(g => (
                                    <button key={g} onClick={() => setActiveGrade(g)} className={`px-10 py-2.5 rounded-xl font-black text-[11px] transition-all uppercase tracking-widest ${activeGrade === g ? 'bg-white text-indigo-600 shadow-md' : 'text-slate-400 hover:text-slate-600'}`}>
                                        Khối {g}
                                    </button>
                                ))}
                            </div>
                            <div className="flex items-center gap-4 px-4 text-[11px] font-bold text-slate-400">
                                <span className="flex items-center gap-1"><Icon name="database" size={14}/> {exams.length} bài đã đăng</span>
                            </div>
                        </header>

                        <div className="flex-1 flex p-8 gap-8 overflow-x-auto custom-scrollbar">
                            {Object.entries(CATEGORIES).map(([key, label]) => (
                                <div key={key} className="flex-1 min-w-[340px] flex flex-col bg-slate-200/30 rounded-[2.5rem] p-6 border border-slate-200/50">
                                    <div className="flex items-center justify-between mb-6 border-b border-indigo-100 pb-4">
                                        <h3 className="font-black text-slate-800 uppercase tracking-[0.2em] text-[12px] flex items-center gap-2">
                                            <div className="w-2 h-2 rounded-full bg-indigo-500"></div> {label}
                                        </h3>
                                    </div>

                                    <div className="flex-1 overflow-y-auto space-y-4 pr-2 column-scroll">
                                        {columns[key].length === 0 ? (
                                            <div className="h-full flex items-center justify-center text-slate-300 italic text-[11px]">Trống</div>
                                        ) : (
                                            columns[key].map(e => (
                                                <div key={e.id} className="bg-white p-5 rounded-3xl border border-transparent hover:border-indigo-300 transition-all shadow-sm group">
                                                    <div className="flex gap-1.5 mb-4 opacity-0 group-hover:opacity-100 transition-opacity">
                                                        <button className="px-3 py-1.5 bg-indigo-500 text-white rounded-xl text-[10px] font-black flex items-center gap-1 shadow-md shadow-indigo-100">
                                                            <Icon name="clock" size={12}/> GIỜ
                                                        </button>
                                                        <button className="px-3 py-1.5 bg-slate-800 text-white rounded-xl text-[10px] font-black flex items-center gap-1 shadow-md shadow-slate-100">
                                                            <Icon name="check-square" size={12}/> ĐÁP ÁN
                                                        </button>
                                                        <button className="p-2 bg-rose-50 text-rose-500 rounded-xl ml-auto hover:bg-rose-500 hover:text-white transition-all">
                                                            <Icon name="trash-2" size={14}/>
                                                        </button>
                                                    </div>
                                                    <h4 className="font-bold text-slate-800 text-sm leading-snug">{e.title}</h4>
                                                    <div className="mt-4 flex items-center justify-between text-[10px] font-bold text-slate-400 uppercase tracking-widest border-t border-slate-50 pt-3">
                                                        <span>{e.duration}p • {e.maxAttempts || 1} Lượt</span>
                                                        <span className="flex items-center gap-1"><Icon name="calendar" size={10}/> {e.createdAt}</span>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
