<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản trị KHTN | Lê Thị Việt Hà</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap');
        body { font-family: 'Lexend', sans-serif; background-color: #f8fafc; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const CATEGORIES = { luyen_tap: 'Luyện tập', bai_tap: 'Bài tập', kiem_tra: 'Kiểm tra' };
        const GRADES = ['6', '7', '8', '9'];

        const Icon = ({ name, size = 16, className = "" }) => {
            const ref = React.useRef(null);
            useEffect(() => { if (window.lucide) window.lucide.createIcons({ root: ref.current }); }, [name]);
            return <span ref={ref} className={className}><i data-lucide={name} style={{width: size, height: size}}></i></span>;
        };

        // --- COMPONENT QUẢN LÝ HỌC SINH (MODAL) ---
        const StudentModal = ({ onClose }) => {
            const [students, setStudents] = useState(() => JSON.parse(localStorage.getItem('tMath_Students') || '[]'));
            const [input, setInput] = useState({ firstName: '', lastName: '', grade: '6' });

            const saveStudents = (data) => {
                setStudents(data);
                localStorage.setItem('tMath_Students', JSON.stringify(data));
            };

            const handleAddManual = () => {
                if(!input.firstName || !input.lastName) return alert("Vui lòng nhập đủ tên!");
                const newSt = { id: Date.now(), name: `${input.lastName} ${input.firstName}`.trim(), grade: input.grade };
                saveStudents([...students, newSt]);
                setInput({ ...input, firstName: '', lastName: '' });
            };

            const handleImportExcel = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const bstr = evt.target.result;
                    const wb = XLSX.read(bstr, { type: 'binary' });
                    const wsname = wb.SheetNames[0];
                    const ws = wb.Sheets[wsname];
                    const data = XLSX.utils.sheet_to_json(ws, { header: 1 });

                    // Bỏ dòng tiêu đề (nếu có), bắt đầu từ dòng 1
                    const imported = data.slice(1).filter(row => row[0] && row[1] && row[2]).map(row => ({
                        id: Math.random(),
                        grade: row[0].toString(),
                        name: `${row[1]} ${row[2]}`.trim()
                    }));

                    saveStudents([...students, ...imported]);
                    alert(`Đã nhập thành công ${imported.length} học sinh!`);
                };
                reader.readAsBinaryString(file);
            };

            return (
                <div className="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                    <div className="bg-white w-full max-w-4xl h-[85vh] rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden animate-in zoom-in duration-200">
                        <div className="p-6 border-b flex justify-between items-center bg-indigo-600 text-white">
                            <h2 className="font-black uppercase tracking-tight flex items-center gap-2"><Icon name="users" size={20}/> Quản lý danh sách Học sinh</h2>
                            <button onClick={onClose} className="p-2 hover:bg-indigo-500 rounded-full transition-colors"><Icon name="x" size={24}/></button>
                        </div>
                        
                        <div className="flex-1 overflow-hidden flex flex-col md:flex-row">
                            {/* Form bên trái */}
                            <div className="w-full md:w-80 p-6 border-r bg-slate-50 space-y-6">
                                <div className="space-y-4">
                                    <h3 className="text-xs font-black text-indigo-600 uppercase tracking-widest">Thêm thủ công</h3>
                                    <input type="text" placeholder="Họ và tên lót" value={input.lastName} onChange={e=>setInput({...input, lastName: e.target.value})} className="w-full p-3 rounded-xl border text-sm font-bold shadow-sm" />
                                    <input type="text" placeholder="Tên" value={input.firstName} onChange={e=>setInput({...input, firstName: e.target.value})} className="w-full p-3 rounded-xl border text-sm font-bold shadow-sm" />
                                    <select value={input.grade} onChange={e=>setInput({...input, grade: e.target.value})} className="w-full p-3 rounded-xl border font-bold text-sm">
                                        {GRADES.map(g => <option key={g} value={g}>Lớp {g}</option>)}
                                    </select>
                                    <button onClick={handleAddManual} className="w-full py-3 bg-indigo-600 text-white rounded-xl font-black text-xs uppercase">Thêm học sinh</button>
                                </div>
                                <div className="pt-6 border-t">
                                    <h3 className="text-xs font-black text-emerald-600 uppercase tracking-widest mb-4">Nhập từ Excel</h3>
                                    <label className="block w-full py-3 px-4 bg-emerald-50 text-emerald-700 border-2 border-dashed border-emerald-200 rounded-xl font-black text-[10px] text-center cursor-pointer hover:bg-emerald-100">
                                        <Icon name="file-spreadsheet" size={18} className="inline mr-2" /> TẢI FILE EXCEL
                                        <input type="file" accept=".xlsx, .xls" className="hidden" onChange={handleImportExcel} />
                                    </label>
                                    <p className="text-[9px] text-slate-400 mt-2 italic">* File gồm 3 cột: Lớp | Họ tên lót | Tên</p>
                                </div>
                            </div>

                            {/* Danh sách bên phải */}
                            <div className="flex-1 p-6 flex flex-col overflow-hidden">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest">Danh sách hiện tại ({students.length})</h3>
                                    <button onClick={()=>saveStudents([])} className="text-[10px] font-bold text-rose-500 hover:underline">Xóa tất cả</button>
                                </div>
                                <div className="flex-1 overflow-y-auto custom-scroll pr-2 space-y-2">
                                    {students.map((s, idx) => (
                                        <div key={s.id || idx} className="flex items-center justify-between p-3 bg-white border rounded-xl shadow-sm hover:border-indigo-200 transition-all">
                                            <div className="flex items-center gap-3">
                                                <span className="w-8 h-8 bg-slate-100 rounded-lg flex items-center justify-center text-[10px] font-black text-slate-500">{idx+1}</span>
                                                <div>
                                                    <p className="font-bold text-sm text-slate-800">{s.name}</p>
                                                    <p className="text-[10px] font-bold text-indigo-500 uppercase">Lớp {s.grade}</p>
                                                </div>
                                            </div>
                                            <button onClick={() => saveStudents(students.filter(item => item.id !== s.id))} className="text-slate-300 hover:text-rose-500 p-1"><Icon name="trash-2" size={14}/></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- APP CHÍNH ---
        const App = () => {
            const [exams, setExams] = useState(() => JSON.parse(localStorage.getItem('tMath_Exams') || '[]'));
            const [activeGrade, setActiveGrade] = useState('6');
            const [showStudentModal, setShowStudentModal] = useState(false);
            const [form, setForm] = useState({ title: '', duration: 45, attempts: 1, grade: '6', category: 'luyen_tap' });

            const saveExam = () => {
                if(!form.title) return alert("Nhập tiêu đề!");
                const newExam = { ...form, id: Date.now(), createdAt: new Date().toLocaleDateString('vi-VN') };
                const updated = [...exams, newExam];
                setExams(updated);
                localStorage.setItem('tMath_Exams', JSON.stringify(updated));
                setForm({...form, title: ''});
            };

            const columns = useMemo(() => {
                const gExams = exams.filter(e => e.grade === activeGrade);
                return {
                    luyen_tap: gExams.filter(e => e.category === 'luyen_tap'),
                    bai_tap: gExams.filter(e => e.category === 'bai_tap'),
                    kiem_tra: gExams.filter(e => e.category === 'kiem_tra')
                };
            }, [exams, activeGrade]);

            return (
                <div className="flex h-screen overflow-hidden text-slate-800">
                    <aside className="w-80 bg-white border-r shadow-2xl z-20 flex flex-col p-6 shrink-0">
                        <div className="mb-6"><h1 className="text-xl font-extrabold text-indigo-600 uppercase">Hệ thống KHTN</h1><p className="text-[10px] font-bold text-slate-400 uppercase mt-1">Lê Thị Việt Hà</p></div>
                        
                        <div className="grid grid-cols-2 gap-2 mb-6">
                            <button onClick={() => setShowStudentModal(true)} className="p-3 border rounded-2xl font-bold text-[10px] uppercase hover:bg-indigo-600 hover:text-white transition-all shadow-sm">
                                <Icon name="users" size={16} className="mb-1 block mx-auto"/> Học sinh
                            </button>
                            <button className="p-3 border rounded-2xl font-bold text-[10px] uppercase hover:bg-indigo-600 hover:text-white transition-all shadow-sm">
                                <Icon name="archive" size={16} className="mb-1 block mx-auto"/> Lưu trữ
                            </button>
                        </div>

                        {/* Form thêm bài vẫn giữ nguyên... */}
                        <div className="flex-1 space-y-4 bg-slate-50 p-4 rounded-3xl border border-slate-100">
                            <h3 className="text-[11px] font-black text-indigo-500 uppercase tracking-widest">Thêm bài mới</h3>
                            <input type="text" placeholder="Tiêu đề..." value={form.title} onChange={e=>setForm({...form, title: e.target.value})} className="w-full p-3 rounded-xl border font-bold text-sm outline-none" />
                            <div className="grid grid-cols-2 gap-2">
                                <input type="number" placeholder="Phút" value={form.duration} onChange={e=>setForm({...form, duration: e.target.value})} className="w-full p-3 rounded-xl border font-bold text-sm text-center" />
                                <input type="number" placeholder="Lượt" value={form.attempts} onChange={e=>setForm({...form, attempts: e.target.value})} className="w-full p-3 rounded-xl border font-bold text-sm text-center" />
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                                <select value={form.grade} onChange={e=>setForm({...form, grade: e.target.value})} className="p-2.5 rounded-xl border font-bold text-xs">
                                    {GRADES.map(g => <option key={g} value={g}>Lớp {g}</option>)}
                                </select>
                                <select value={form.category} onChange={e=>setForm({...form, category: e.target.value})} className="p-2.5 rounded-xl border font-bold text-xs">
                                    {Object.entries(CATEGORIES).map(([k,v]) => <option key={k} value={k}>{v}</option>)}
                                </select>
                            </div>
                            <button onClick={saveExam} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-[11px]">Tải lên hệ thống</button>
                        </div>
                        
                        <div className="mt-auto text-center border-t pt-4"><p className="text-[9px] font-bold text-slate-400 uppercase">Bản quyền thuộc Lê Thị Việt Hà</p></div>
                    </aside>

                    <main className="flex-1 flex flex-col bg-slate-50">
                        <header className="bg-white p-4 border-b flex items-center justify-between shadow-sm">
                            <div className="flex bg-slate-100 p-1 rounded-2xl">
                                {GRADES.map(g => (
                                    <button key={g} onClick={() => setActiveGrade(g)} className={`px-10 py-2 rounded-xl font-black text-[11px] uppercase ${activeGrade === g ? 'bg-white text-indigo-600 shadow-md' : 'text-slate-400'}`}>Lớp {g}</button>
                                ))}
                            </div>
                        </header>
                        <div className="flex-1 flex p-8 gap-6 overflow-x-auto custom-scroll">
                            {/* Render 3 cột như cũ... */}
                            {Object.entries(CATEGORIES).map(([key, label]) => (
                                <div key={key} className="flex-1 min-w-[320px] flex flex-col bg-slate-200/30 rounded-[2.5rem] p-5 border border-slate-200/50">
                                    <h3 className="font-black text-slate-800 uppercase tracking-widest text-[11px] mb-6 flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-indigo-500"></div> {label}</h3>
                                    <div className="flex-1 overflow-y-auto space-y-3 custom-scroll pr-1">
                                        {columns[key].map(e => (
                                            <div key={e.id} className="bg-white p-4 rounded-3xl border shadow-sm group">
                                                <h4 className="font-bold text-slate-800 text-sm">{e.title}</h4>
                                                <div className="mt-2 text-[9px] font-bold text-slate-400 uppercase tracking-widest">{e.duration}p • {e.attempts} Lượt</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* HIỂN THỊ MODAL HỌC SINH */}
                    {showStudentModal && <StudentModal onClose={() => setShowStudentModal(false)} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
