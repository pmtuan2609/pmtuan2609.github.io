<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tMath Admin 2026 | © Pham Minh Tuan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap');
        body { font-family: 'Lexend', sans-serif; background-color: #f1f5f9; }
        .column-scroll::-webkit-scrollbar { width: 4px; }
        .column-scroll::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        .btn-action { transition: all 0.2s; }
        .btn-action:hover { transform: translateY(-2px); filter: brightness(1.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const CATEGORIES = { luyen_tap: 'Luyện tập', bai_tap: 'Bài tập', kiem_tra: 'Kiểm tra' };
        const GRADES = ['6', '7', '8', '9'];

        const Icon = ({ name, size = 16, className = "" }) => {
            const ref = React.useRef(null);
            useEffect(() => { if (window.lucide) window.lucide.createIcons({ root: ref.current }); }, [name]);
            return <span ref={ref} className={className}><i data-lucide={name} style={{width: size, height: size}}></i></span>;
        };

        const App = () => {
            const [activeGrade, setActiveGrade] = useState('6');
            const [exams, setExams] = useState([]); // Dữ liệu sẽ load từ exams_data.json qua API

            // Lọc đề 3 cột theo lớp đã chọn
            const columns = useMemo(() => {
                const gExams = exams.filter(e => e.grade === activeGrade);
                return {
                    luyen_tap: gExams.filter(e => e.category === 'luyen_tap'),
                    bai_tap: gExams.filter(e => e.category === 'bai_tap'),
                    kiem_tra: gExams.filter(e => e.category === 'kiem_tra')
                };
            }, [exams, activeGrade]);

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* LEFT SIDEBAR: UPLOAD WORD ONLY */}
                    <aside className="w-80 bg-white border-r shadow-2xl z-20 flex flex-col p-6 shrink-0">
                        <div className="mb-8">
                            <h1 className="text-2xl font-black text-emerald-600 tracking-tighter">tMath Admin</h1>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1 italic">Hệ thống của Thầy Tuân & Cô Hà</p>
                        </div>

                        <div className="space-y-4">
                            <div className="space-y-1">
                                <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Tên bài học/đề thi</label>
                                <input type="text" placeholder="Nhập tiêu đề..." className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-sm focus:ring-2 ring-emerald-500 outline-none" />
                            </div>

                            <div className="grid grid-cols-2 gap-3">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Lớp</label>
                                    <select className="w-full p-3 bg-slate-50 border rounded-xl font-bold text-sm outline-none">
                                        {GRADES.map(g => <option key={g} value={g}>Lớp {g}</option>)}
                                    </select>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Thời gian</label>
                                    <input type="number" defaultValue={45} className="w-full p-3 bg-slate-50 border rounded-xl font-bold text-sm text-center outline-none" />
                                </div>
                            </div>

                            <label className="flex flex-col items-center justify-center border-2 border-dashed border-emerald-200 rounded-[2rem] py-10 px-4 cursor-pointer hover:bg-emerald-50 transition-all group mt-4">
                                <div className="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center mb-3 group-hover:rotate-6 transition-transform">
                                    <Icon name="file-text" size={28} />
                                </div>
                                <span className="text-[10px] font-black text-emerald-700 uppercase">Chọn file Word (.docx)</span>
                                <input type="file" accept=".docx" className="hidden" />
                            </label>

                            <button className="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-lg shadow-emerald-100 hover:bg-emerald-700 transition-all uppercase text-[11px] tracking-widest">
                                Tải lên hệ thống
                            </button>
                        </div>
                        <div className="mt-auto pt-6 text-center border-t border-slate-100">
                            <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">© Copyright Pham Minh Tuan</p>
                        </div>
                    </aside>

                    {/* MAIN: 3 COLUMNS VIEW */}
                    <main className="flex-1 flex flex-col overflow-hidden">
                        <header className="bg-white p-4 border-b flex items-center justify-between shadow-sm shrink-0">
                            <div className="flex bg-slate-100 p-1.5 rounded-2xl">
                                {GRADES.map(g => (
                                    <button key={g} onClick={() => setActiveGrade(g)} className={`px-8 py-2 rounded-xl font-black text-xs transition-all ${activeGrade === g ? 'bg-white text-emerald-600 shadow-md' : 'text-slate-400 hover:text-slate-600'}`}>
                                        KHỐI {g}
                                    </button>
                                ))}
                            </div>
                            <div className="flex gap-2">
                                <button className="p-2.5 bg-slate-100 text-slate-500 rounded-xl hover:bg-emerald-500 hover:text-white transition-all"><Icon name="settings" size={20}/></button>
                                <button className="p-2.5 bg-slate-100 text-slate-500 rounded-xl hover:bg-rose-500 hover:text-white transition-all"><Icon name="log-out" size={20}/></button>
                            </div>
                        </header>

                        <div className="flex-1 flex p-8 gap-8 overflow-x-auto bg-slate-50/50 custom-scrollbar">
                            {Object.entries(CATEGORIES).map(([key, label]) => (
                                <div key={key} className="flex-1 min-w-[340px] flex flex-col bg-white border border-slate-200 shadow-sm rounded-[2.5rem] p-6">
                                    <div className="flex items-center justify-between mb-6 border-b border-slate-50 pb-4">
                                        <h3 className="font-black text-slate-800 uppercase tracking-[0.2em] text-[12px] flex items-center gap-2">
                                            <div className="w-2 h-2 rounded-full bg-emerald-500"></div> {label}
                                        </h3>
                                        <span className="bg-slate-100 text-slate-400 text-[10px] font-black px-2 py-0.5 rounded-full">{columns[key].length} Đề</span>
                                    </div>

                                    <div className="flex-1 overflow-y-auto space-y-4 pr-2 column-scroll">
                                        {columns[key].map(e => (
                                            <div key={e.id} className="bg-slate-50/50 p-5 rounded-3xl border border-transparent hover:border-emerald-200 transition-all group relative">
                                                <div className="flex gap-1.5 mb-4 opacity-0 group-hover:opacity-100 transition-opacity">
                                                    <button className="px-3 py-1.5 bg-blue-500 text-white rounded-xl text-[10px] font-black flex items-center gap-1 shadow-md shadow-blue-100 btn-action">
                                                        <Icon name="clock" size={12}/> GIỜ
                                                    </button>
                                                    <button className="px-3 py-1.5 bg-emerald-500 text-white rounded-xl text-[10px] font-black flex items-center gap-1 shadow-md shadow-emerald-100 btn-action">
                                                        <Icon name="check-square" size={12}/> ĐÁP ÁN
                                                    </button>
                                                    <button className="p-1.5 bg-white text-rose-500 rounded-xl border border-rose-100 ml-auto hover:bg-rose-500 hover:text-white transition-all">
                                                        <Icon name="trash-2" size={14}/>
                                                    </button>
                                                </div>
                                                <h4 className="font-bold text-slate-800 text-sm leading-snug line-clamp-2">{e.title}</h4>
                                                <div className="mt-4 flex items-center justify-between text-[10px] font-bold text-slate-400 uppercase tracking-widest border-t border-slate-100 pt-3">
                                                    <span>{e.duration} Phút</span>
                                                    <span className="flex items-center gap-1"><Icon name="calendar" size={10}/> {e.createdAt}</span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
